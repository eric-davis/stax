<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; frame-src https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self';">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>STAX — Neon Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="touch-controls">
    <div class="touch-row">
      <button class="touch-btn" id="btn-left"    aria-label="Move Left">&#9664;</button>
      <button class="touch-btn" id="btn-rot-ccw" aria-label="Rotate CCW">&#8634;</button>
      <button class="touch-btn" id="btn-rot-cw"  aria-label="Rotate CW">&#8635;</button>
      <button class="touch-btn" id="btn-right"   aria-label="Move Right">&#9654;</button>
    </div>
    <div class="touch-row">
      <button class="touch-btn" id="btn-soft"  aria-label="Soft Drop">&#9660;</button>
      <button class="touch-btn" id="btn-hard"  aria-label="Hard Drop">&#9651;</button>
      <button class="touch-btn" id="btn-pause" aria-label="Pause">&#9646;&#9646;</button>
      <button class="touch-btn" id="btn-quit"  aria-label="Quit">&#10005;</button>
    </div>
    <div class="touch-row touch-row-sm">
      <button class="touch-btn touch-btn-sm" id="btn-mute"  aria-label="Toggle Mute">&#128263;</button>
      <button class="touch-btn touch-btn-sm" id="btn-track" aria-label="Next Track">&#9197;</button>
    </div>
  </div>

  <div id="name-overlay">
    <div id="name-box">
      <div id="name-score"></div>
      <label for="name-input">Enter your name</label>
      <form id="name-form">
        <input id="name-input" type="text" maxlength="12" autocomplete="off" spellcheck="false" placeholder="Anonymous">
        <button type="submit">SAVE</button>
      </form>
    </div>
  </div>

  <footer id="privacy-footer">
    This site uses <a href="https://www.cloudflare.com/privacypolicy/" target="_blank" rel="noopener">Cloudflare Turnstile</a> for spam protection.
  </footer>
  <div id="turnstile-container"></div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
