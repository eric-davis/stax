<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#07071a" rx="4"/>
  <!-- S-piece: top row right, bottom row left, overlap in middle column -->
  <rect x="12" y="8"  width="8" height="8" fill="#cc00ff" rx="1.5" filter="url(#g)"/>
  <rect x="20" y="8"  width="8" height="8" fill="#cc00ff" rx="1.5" filter="url(#g)"/>
  <rect x="4"  y="16" width="8" height="8" fill="#cc00ff" rx="1.5" filter="url(#g)"/>
  <rect x="12" y="16" width="8" height="8" fill="#cc00ff" rx="1.5" filter="url(#g)"/>
</svg>
